services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ukleytech-app
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.services.ukleytech.loadbalancer.server.port=80

      # HTTP -> HTTPS
      - traefik.http.routers.ukleytech-http.rule=Host(`ukleytech.com.br`) || Host(`www.ukleytech.com.br`)
      - traefik.http.routers.ukleytech-http.entrypoints=web
      - traefik.http.routers.ukleytech-http.middlewares=ukleytech-https
      - traefik.http.middlewares.ukleytech-https.redirectscheme.scheme=https

      # HTTPS canonical
      - traefik.http.routers.ukleytech-https.rule=Host(`ukleytech.com.br`)
      - traefik.http.routers.ukleytech-https.entrypoints=websecure
      - traefik.http.routers.ukleytech-https.tls=true
      - traefik.http.routers.ukleytech-https.tls.certresolver=letsencrypt

      # HTTPS www -> apex
      - traefik.http.routers.ukleytech-www.rule=Host(`www.ukleytech.com.br`)
      - traefik.http.routers.ukleytech-www.entrypoints=websecure
      - traefik.http.routers.ukleytech-www.tls=true
      - traefik.http.routers.ukleytech-www.tls.certresolver=letsencrypt
      - traefik.http.routers.ukleytech-www.middlewares=ukleytech-www-to-apex
      - traefik.http.middlewares.ukleytech-www-to-apex.redirectregex.regex=^https://www\\.ukleytech\\.com\\.br/(.*)
      - traefik.http.middlewares.ukleytech-www-to-apex.redirectregex.replacement=https://ukleytech.com.br/$${1}
      - traefik.http.middlewares.ukleytech-www-to-apex.redirectregex.permanent=true
    networks:
      - traefik-public

networks:
  traefik-public:
    external: true
