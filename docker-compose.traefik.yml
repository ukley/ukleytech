services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ukleytech-app
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.services.ukleytech.loadbalancer.server.port=80
      - traefik.http.routers.ukleytech-http.rule=Host(`ukleytech.com.br`) || Host(`www.ukleytech.com.br`)
      - traefik.http.routers.ukleytech-http.entrypoints=web
    networks:
      - traefik-public

networks:
  traefik-public:
    external: true
